<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOCX to Excel Processor</title>
  <style>
    :root {
      --bg: #f3f7fb;
      --card: #ffffff;
      --ink: #0f172a;
      --accent: #0d9488;
      --accent-2: #155e75;
      --muted: #475569;
      --error: #b91c1c;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 10%, #dbeafe 0%, transparent 40%),
        radial-gradient(circle at 90% 85%, #ccfbf1 0%, transparent 45%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(520px, 100%);
      background: var(--card);
      border: 1px solid #dbe3ef;
      border-radius: 16px;
      box-shadow: 0 18px 40px rgba(2, 6, 23, 0.08);
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.35rem;
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
    }

    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    input[type="text"],
    input[type="file"],
    button {
      width: 100%;
      box-sizing: border-box;
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 0.95rem;
    }

    input[type="text"],
    input[type="file"] {
      border: 1px solid #cbd5e1;
      background: #fff;
    }

    button {
      border: none;
      margin-top: 16px;
      color: #fff;
      background: linear-gradient(120deg, var(--accent), var(--accent-2));
      cursor: pointer;
      font-weight: 700;
    }

    button:disabled {
      opacity: 0.6;
      cursor: wait;
    }

    .status {
      margin-top: 14px;
      font-size: 0.92rem;
      min-height: 22px;
      color: var(--muted);
    }

    .status.error {
      color: var(--error);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Upload DOCX and Get XLSX</h1>
    <p>Frontend can be hosted on GitHub Pages. API should point to ngrok URL.</p>

    <form id="uploadForm">
      <label for="apiUrl">Local machine public URL (ngrok)</label>
      <input id="apiUrl" type="text" placeholder="https://xxxx.ngrok-free.app" required>

      <label for="fileInput">DOCX file</label>
      <input id="fileInput" type="file" accept=".docx" required>

      <button id="submitBtn" type="submit">Convert on My Machine</button>
    </form>

    <div id="status" class="status"></div>
  </main>

  <script>
    const form = document.getElementById("uploadForm");
    const statusEl = document.getElementById("status");
    const submitBtn = document.getElementById("submitBtn");

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle("error", isError);
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const fileInput = document.getElementById("fileInput");
      const apiUrlInput = document.getElementById("apiUrl");

      if (!fileInput.files || fileInput.files.length === 0) {
        setStatus("Please choose a DOCX file.", true);
        return;
      }

      const file = fileInput.files[0];
      const apiUrl = apiUrlInput.value.trim().replace(/\/$/, "");
      if (!apiUrl) {
        setStatus("Please enter ngrok URL.", true);
        return;
      }

      const formData = new FormData();
      formData.append("inputFile", file);

      setStatus("Uploading and processing...");
      submitBtn.disabled = true;

      try {
        const response = await fetch(`${apiUrl}/process`, {
          method: "POST",
          body: formData,
        });

        if (!response.ok) {
          let message = `Server returned ${response.status}`;
          try {
            const err = await response.json();
            if (err && err.error) {
              message = err.error;
            }
          } catch {
            // Ignore non-JSON error responses.
          }
          throw new Error(message);
        }

        const blob = await response.blob();
        const downloadUrl = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = downloadUrl;
        anchor.download = file.name.replace(/\.docx$/i, "") + "_converted.xlsx";
        document.body.appendChild(anchor);
        anchor.click();
        anchor.remove();
        URL.revokeObjectURL(downloadUrl);

        setStatus("Done. Your converted file has been downloaded.");
      } catch (err) {
        setStatus(`Error: ${err.message}`, true);
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
