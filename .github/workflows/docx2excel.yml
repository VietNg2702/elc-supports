name: DOCX to Excel

on:
  workflow_dispatch:
    inputs:
      input_docx:
        description: "Path to input DOCX file in repository"
        required: true
        type: string
      output_xlsx:
        description: "Path to output XLSX file to generate"
        required: true
        type: string

jobs:
  convert:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run converter action
        uses: ./.github/actions/docx2excel
        with:
          input_docx: ${{ github.event.inputs.input_docx }}
          output_xlsx: ${{ github.event.inputs.output_xlsx }}

      - name: Upload converted Excel file
        uses: actions/upload-artifact@v4
        with:
          name: converted-xlsx
          path: ${{ github.event.inputs.output_xlsx }}
